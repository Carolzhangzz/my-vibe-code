<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carol's Vibe Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#faf6f1;color:#1a1a1a;min-height:100vh}

.wrap{max-width:520px;margin:0 auto;padding:80px 20px 60px}

header{margin-bottom:32px}
h1{font-family:'Bricolage Grotesque',serif;font-weight:600;font-size:1.6rem;letter-spacing:-0.02em;margin-bottom:4px}
header p{font-size:0.85rem;color:#9a9590}

.list{display:flex;flex-direction:column;gap:8px}

a.item{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:rgba(255,255,255,0.5);
  border:1px solid rgba(0,0,0,0.05);
  border-radius:12px;
  text-decoration:none;color:inherit;
  transition:background .2s,transform .2s,box-shadow .2s;
}
a.item:hover{background:rgba(255,255,255,0.85);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.04)}

.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.item-text h2{font-family:'Bricolage Grotesque',serif;font-weight:600;font-size:0.95rem;letter-spacing:-0.01em}
.item-text p{font-size:0.75rem;color:#9a9590;margin-top:2px}

.arrow{margin-left:auto;color:#ccc;font-size:0.85rem;transition:transform .2s}
a.item:hover .arrow{transform:translateX(2px);color:#999}

span.item{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:rgba(255,255,255,0.3);
  border:1px solid rgba(0,0,0,0.03);
  border-radius:12px;
  opacity:0.6;
}

footer{text-align:center;margin-top:40px;font-size:0.75rem;color:#bbb}
footer a{color:#999;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>My Vibe Code</h1>
    <p>by Carol Zhang</p>
  </header>
  <div class="list">
    <a class="item" href="https://carolzhangzz.github.io/paper-daily/" target="_blank">
      <span class="dot" style="background:#4285f4"></span>
      <div class="item-text">
        <h2>Paper Daily</h2>
        <p>Daily HCI & AI paper digest from arXiv & HuggingFace</p>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
    <a class="item" href="https://carolzhangzz.github.io/paper-reader/" target="_blank">
      <span class="dot" style="background:#ea4335"></span>
      <div class="item-text">
        <h2>Paper Reader</h2>
        <p>AI-powered paper reader — summarize, translate, Q&A</p>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
    <a class="item" href="./desktop-pet/index.html" target="_blank">
      <span class="dot" style="background:#34a853"></span>
      <div class="item-text">
        <h2>Desktop Pet</h2>
        <p>像素风桌面宠物</p>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
    <span class="item">
      <span class="dot" style="background:#f9ab00"></span>
      <div class="item-text">
        <h2>Prompt Tester</h2>
        <p>LLM prompt testing & evaluation tool</p>
      </div>
    </span>
  </div>
  <footer><a href="https://github.com/Carolzhangzz" target="_blank">@Carolzhangzz</a></footer>
</div>
</body>
</html>
