<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop Pet Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf6f1;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;cursor:default;user-select:none}

.scene{position:relative;width:100vw;height:100vh}

/* Pet container */
.pet{
  position:absolute;
  bottom:60px;left:50%;
  transform:translateX(-50%);
  cursor:grab;
  z-index:10;
  transition:filter .2s;
}
.pet:active{cursor:grabbing}
.pet:hover{filter:brightness(1.05)}

/* Pixel art rendered via box-shadow on a single pixel */
.sprite{
  width:4px;height:4px;
  image-rendering:pixelated;
  position:relative;
}

/* Speech bubble */
.bubble{
  position:absolute;
  bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);
  background:white;
  border:2px solid #333;
  border-radius:12px;
  padding:6px 12px;
  font-size:13px;
  white-space:nowrap;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:#333;
}
.pet:hover .bubble{opacity:1}

/* Ground */
.ground{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:#e8e0d6;
  border-top:3px solid #d4ccc2;
}

/* Floating hearts on click */
.heart{
  position:absolute;
  font-size:18px;
  pointer-events:none;
  animation:floatUp 1s ease-out forwards;
  z-index:20;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

/* Pet selector */
.selector{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:20;
}
.selector button{
  padding:6px 14px;
  border:2px solid #d4ccc2;
  background:white;
  border-radius:100px;
  font-size:13px;
  cursor:pointer;
  transition:all .2s;
}
.selector button:hover{border-color:#999}
.selector button.active{border-color:#333;background:#333;color:white}

/* Back link */
.back{
  position:absolute;top:20px;left:20px;z-index:20;
  font-size:13px;color:#999;text-decoration:none;
  transition:color .2s;
}
.back:hover{color:#333}

/* Info */
.info{
  position:absolute;bottom:76px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#bbb;z-index:5;
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <a class="back" href="../">&larr; Back</a>

  <div class="selector">
    <button class="active" data-pet="mouse">Mouse</button>
    <button data-pet="cat">Cat</button>
    <button data-pet="bunny">Bunny</button>
    <button data-pet="frog">Frog</button>
  </div>

  <div class="pet" id="pet">
    <div class="bubble" id="bubble">Hi!</div>
    <canvas id="canvas" width="64" height="64" style="image-rendering:pixelated;width:128px;height:128px"></canvas>
  </div>

  <span class="info">click to pet &middot; drag to move</span>
  <div class="ground"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const pet = document.getElementById('pet');
const bubble = document.getElementById('bubble');
const scene = document.getElementById('scene');

const pets = {
  mouse: {
    color: '#8B8B8B',
    dark: '#666',
    ear: '#FFB6C1',
    eye: '#333',
    msgs: ['Squeak!', 'Cheese?', '*sniff sniff*', 'Hi!', ':3'],
    body: (c) => {
      // ears
      fill(c.ear, [[18,10],[19,10],[20,10],[18,11],[19,11],[20,11],[17,12],[18,12]]);
      fill(c.ear, [[44,10],[45,10],[46,10],[44,11],[45,11],[46,11],[46,12],[47,12]]);
      // head
      fillRect(c.color, 22, 10, 20, 14);
      fillRect(c.dark, 22, 22, 20, 4);
      // eyes
      fill(c.eye, [[28,16],[29,16],[36,16],[37,16]]);
      // nose
      fill('#FFB6C1', [[32,19],[33,19]]);
      // body
      fillRect(c.color, 18, 26, 28, 16);
      fillRect(c.dark, 18, 38, 28, 4);
      // legs
      fill(c.dark, [[20,42],[21,42],[22,42],[23,42],[40,42],[41,42],[42,42],[43,42]]);
      fill(c.dark, [[20,43],[21,43],[22,43],[23,43],[40,43],[41,43],[42,43],[43,43]]);
      // tail
      fill(c.color, [[46,30],[47,30],[48,31],[49,32],[50,33],[51,33],[52,34],[53,34]]);
    }
  },
  cat: {
    color: '#F4A460',
    dark: '#D2893A',
    ear: '#F4A460',
    eye: '#333',
    msgs: ['Meow~', 'Purr...', '*stretch*', 'Feed me!', 'Nya~'],
    body: (c) => {
      // ears (triangles)
      fill(c.ear, [[18,8],[19,8],[17,9],[18,9],[19,9],[20,9],[17,10],[18,10],[19,10],[20,10],[21,10]]);
      fill(c.ear, [[44,8],[45,8],[43,9],[44,9],[45,9],[46,9],[42,10],[43,10],[44,10],[45,10],[46,10]]);
      fill('#FFB6C1', [[18,9],[19,9],[18,10],[19,10]]);
      fill('#FFB6C1', [[44,9],[45,9],[44,10],[45,10]]);
      // head
      fillRect(c.color, 20, 11, 24, 14);
      // eyes
      fill(c.eye, [[27,17],[28,17],[36,17],[37,17]]);
      fill('#5B5', [[26,17],[35,17]]);
      // nose + mouth
      fill('#FFB6C1', [[32,20]]);
      fill(c.dark, [[31,21],[33,21]]);
      // body
      fillRect(c.color, 18, 26, 28, 16);
      fillRect(c.dark, 20, 34, 24, 6);
      // legs
      fill(c.dark, [[20,42],[21,42],[22,42],[23,42],[40,42],[41,42],[42,42],[43,42]]);
      fill(c.dark, [[20,43],[21,43],[22,43],[23,43],[40,43],[41,43],[42,43],[43,43]]);
      // tail
      fill(c.color, [[46,28],[47,27],[48,26],[49,25],[50,24],[51,24],[52,25]]);
    }
  },
  bunny: {
    color: '#F5F5F5',
    dark: '#DDD',
    ear: '#FFB6C1',
    eye: '#333',
    msgs: ['Hop!', '*munch*', 'Carrot?', '~(^.^)~', 'Boing!'],
    body: (c) => {
      // long ears
      fillRect(c.color, 24, 2, 4, 10);
      fillRect(c.color, 36, 2, 4, 10);
      fill(c.ear, [[25,3],[26,3],[25,4],[26,4],[25,5],[26,5],[25,6],[26,6],[25,7],[26,7]]);
      fill(c.ear, [[37,3],[38,3],[37,4],[38,4],[37,5],[38,5],[37,6],[38,6],[37,7],[38,7]]);
      // head
      fillRect(c.color, 22, 12, 20, 14);
      // eyes
      fill(c.eye, [[28,18],[29,18],[36,18],[37,18]]);
      // nose
      fill(c.ear, [[32,21],[33,21]]);
      // cheeks
      fill('#FFD0D0', [[25,20],[26,20],[25,21],[26,21],[38,20],[39,20],[38,21],[39,21]]);
      // body
      fillRect(c.color, 20, 26, 24, 16);
      fillRect(c.dark, 20, 36, 24, 4);
      // legs
      fill(c.dark, [[22,42],[23,42],[24,42],[25,42],[38,42],[39,42],[40,42],[41,42]]);
      fill(c.dark, [[22,43],[23,43],[24,43],[25,43],[38,43],[39,43],[40,43],[41,43]]);
      // fluffy tail
      fill(c.color, [[44,30],[45,30],[46,30],[44,31],[45,31],[46,31],[45,32]]);
    }
  },
  frog: {
    color: '#6ABF69',
    dark: '#4A9F49',
    ear: '#6ABF69',
    eye: '#333',
    msgs: ['Ribbit!', '*splash*', 'Croak~', 'Hop hop!', ':P'],
    body: (c) => {
      // big eyes on top
      fillRect('#fff', 22, 10, 8, 8);
      fillRect('#fff', 34, 10, 8, 8);
      fill(c.eye, [[26,13],[27,13],[26,14],[27,14]]);
      fill(c.eye, [[38,13],[39,13],[38,14],[39,14]]);
      fillRect(c.color, 30, 12, 4, 4);
      // head
      fillRect(c.color, 20, 16, 24, 10);
      // mouth
      fill(c.dark, [[24,23],[25,23],[38,23],[39,23]]);
      fill('#FF6B6B', [[26,24],[27,24],[28,24],[35,24],[36,24],[37,24]]);
      // body
      fillRect(c.color, 18, 26, 28, 14);
      fillRect(c.dark, 22, 30, 20, 6);
      fill('#90D08F', [[24,31],[25,31],[26,31],[37,31],[38,31],[39,31]]);
      // legs
      fill(c.dark, [[18,40],[19,40],[20,40],[21,40],[22,40],[42,40],[43,40],[44,40],[45,40],[46,40]]);
      fill(c.dark, [[16,41],[17,41],[18,41],[19,41],[20,41],[21,41],[43,41],[44,41],[45,41],[46,41],[47,41],[48,41]]);
    }
  }
};

function fill(color, pixels) {
  ctx.fillStyle = color;
  pixels.forEach(([x,y]) => ctx.fillRect(x, y, 1, 1));
}

function fillRect(color, x, y, w, h) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

let currentPet = 'mouse';
let frame = 0;
let idleTimer = 0;

function drawPet(name) {
  ctx.clearRect(0, 0, 64, 64);
  const p = pets[name];
  p.body(p);
}

function animateIdle() {
  idleTimer++;
  if (idleTimer % 60 < 30) {
    pet.style.transform = `translateX(-50%) translateY(0px)`;
  } else {
    pet.style.transform = `translateX(-50%) translateY(-2px)`;
  }
  requestAnimationFrame(animateIdle);
}

// Draw initial
drawPet(currentPet);
animateIdle();

// Selector buttons
document.querySelectorAll('.selector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.selector .active').classList.remove('active');
    btn.classList.add('active');
    currentPet = btn.dataset.pet;
    drawPet(currentPet);
    showMsg();
  });
});

// Click to show message
function showMsg() {
  const msgs = pets[currentPet].msgs;
  bubble.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  bubble.style.opacity = '1';
  setTimeout(() => bubble.style.opacity = '0', 1500);
}

pet.addEventListener('click', (e) => {
  showMsg();
  // Float heart
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.textContent = ['❤️','💕','✨','💖'][Math.floor(Math.random()*4)];
  heart.style.left = e.clientX - 10 + 'px';
  heart.style.top = e.clientY - 10 + 'px';
  scene.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
});

// Drag
let dragging = false, offX = 0, offY = 0;

pet.addEventListener('mousedown', (e) => {
  dragging = true;
  const rect = pet.getBoundingClientRect();
  offX = e.clientX - rect.left;
  offY = e.clientY - rect.top;
  pet.style.transition = 'none';
  pet.style.transform = 'none';
  pet.style.left = rect.left + 'px';
  pet.style.top = rect.top + 'px';
});

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  pet.style.left = (e.clientX - offX) + 'px';
  pet.style.top = (e.clientY - offY) + 'px';
});

document.addEventListener('mouseup', () => { dragging = false; });

// Touch support
pet.addEventListener('touchstart', (e) => {
  dragging = true;
  const touch = e.touches[0];
  const rect = pet.getBoundingClientRect();
  offX = touch.clientX - rect.left;
  offY = touch.clientY - rect.top;
  pet.style.transition = 'none';
  pet.style.transform = 'none';
  pet.style.left = rect.left + 'px';
  pet.style.top = rect.top + 'px';
}, {passive: true});

document.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  const touch = e.touches[0];
  pet.style.left = (touch.clientX - offX) + 'px';
  pet.style.top = (touch.clientY - offY) + 'px';
}, {passive: true});

document.addEventListener('touchend', () => { dragging = false; });
</script>

</body>
</html>
